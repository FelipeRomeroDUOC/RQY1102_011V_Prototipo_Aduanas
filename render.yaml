services:
  - type: web
    name: aduanas-backend
    env: python
    plan: free
    buildCommand: "cd aduanas-mvp/backend && pip install -r requirements.txt"
    startCommand: "cd aduanas-mvp/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  - type: web
    name: aduanas-frontend
    env: static
    buildCommand: "cd aduanas-mvp/frontend && npm install && npm run build"
    staticPublishPath: "./aduanas-mvp/frontend/dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: aduanas-backend
          envVarKey: RENDER_EXTERNAL_URL
