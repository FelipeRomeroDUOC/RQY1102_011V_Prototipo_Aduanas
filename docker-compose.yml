services:
  backend:
    build:
      context: ./aduanas-mvp/backend
    ports:
      - "8000:8000"
    # Montamos el código fuente como volumen para que los cambios se reflejen en vivo (hot-reload)
    volumes:
      - ./aduanas-mvp/backend:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./aduanas-mvp/frontend
    ports:
      - "5173:5173"
    # Montamos el código fuente como volumen para que los cambios se reflejen en vivo (HMR)
    volumes:
      - ./aduanas-mvp/frontend:/app
      # Ignoramos la sobreescritura de node_modules locales sobre el contenedor
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Ayuda a que el hot-reload funcione correctamente en Docker Windows
    depends_on:
      - backend
